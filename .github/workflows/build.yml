name: build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  firmware:
    runs-on: ubuntu-latest
    env:
      # Override via repo variable if the archive.org path ever moves.
      MAC_PLUS_ROM_URL: ${{ vars.MAC_PLUS_ROM_URL || 'https://raw.githubusercontent.com/sentient06/MacROMan/master/TestImages/128KB%20ROMs/1986-03%20-%204D1F8172%20-%20MacPlus%20v3.ROM' }}
    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      - name: Cache PlatformIO toolchains
        uses: actions/cache@v4
        with:
          path: |
            .pio-core
            .pio
          key: pio-${{ runner.os }}-${{ hashFiles('platformio.ini') }}
          restore-keys: |
            pio-${{ runner.os }}-

      - name: Build firmware
        run: nix run .#ci-build

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cydintosh-firmware
          if-no-files-found: error
          path: |
            .pio/build/esp32dev/firmware.bin
            .pio/build/esp32dev/bootloader.bin
            .pio/build/esp32dev/partitions.bin
            rom_patched.bin
            partitions.csv
